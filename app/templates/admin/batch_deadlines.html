{% extends "base.html" %}

{% block content %}
<h2>Set Deadlines - {{ batch.name }}</h2>

<div class="card p-4">
    <form method="POST">
        <table class="table">
            <thead>
                <tr>
                    <th>Stage</th>
                    <th>Deadline</th>
                </tr>
            </thead>
            <tbody>
                {% for stage in stages %}
                <tr>
                    <td>{{ stage.name }}</td>
                    <td>
                        <input type="date"
                               name="{{ stage._id }}"
                               class="form-control"
                               value="{{ deadline_dict.get(stage._id|string, '') }}">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button class="btn btn-primary">Save Deadlines</button>
    </form>
</div>
{% endblock %}
